<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>情侣飞行棋 | Cloudflare Pages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="min-h-screen">
  <div id="loader" class="loader show" aria-label="页面加载中">✈️</div>
  <main class="page-container mx-auto max-w-6xl p-6">
    <header class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-violet-700">❤️ 情侣飞行棋</h1>
      <p class="mt-2 text-slate-600">掷骰子、走格子、触发甜蜜任务</p>
    </header>

    <section class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
      <article class="rounded-2xl card p-5 shadow">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-xl font-semibold">✈️ 飞行棋主界面</h2>
          <div class="flex items-center gap-2">
            <label for="player-count" class="text-sm text-slate-600">玩家</label>
            <select id="player-count" class="rounded-lg border px-2 py-1 soft-input" aria-label="选择玩家人数">
              <option value="2">2 人</option>
              <option value="3">3 人</option>
              <option value="4">4 人</option>
            </select>
            <button id="reset-game-btn" class="btn-soft rounded-lg px-3 py-1 text-sm text-violet-700" aria-label="重新开始游戏">重开</button>
          </div>
        </div>

        <div id="board" class="board"></div>
      </article>

      <aside class="space-y-4">
        <article class="rounded-2xl card p-5 shadow">
          <h3 class="mb-3 text-lg font-semibold">游戏控制</h3>
          <div id="turn-info" class="mb-3 rounded-lg bg-slate-50 p-3 text-slate-700"></div>
          <button id="roll-btn" class="btn-soft w-full rounded-xl px-4 py-3 text-lg font-bold" aria-label="掷骰子开始回合">🎲 抽一个和TA的小任务✨</button>
          <div id="dice-result" class="mt-3 rounded-lg bg-slate-50 p-3 text-center text-slate-700">等待掷骰</div>
          <div id="winner-info" class="mt-3 hidden rounded-lg bg-emerald-100 p-3 font-semibold text-emerald-700"></div>
        </article>

        <article class="rounded-2xl card p-5 shadow">
          <h3 class="mb-3 text-lg font-semibold">玩家进度</h3>
          <ul id="player-list" class="space-y-2"></ul>
        </article>

        <article class="rounded-2xl card p-5 shadow">
          <h3 class="mb-3 text-lg font-semibold">❤️ 贡献关键词</h3>
          <form id="submit-form" class="space-y-3">
            <select id="category" class="w-full rounded-lg border px-3 py-2 soft-input" aria-label="选择关键词分类">
              <option value="romance">浪漫任务</option>
              <option value="challenge">亲密挑战</option>
              <option value="reward">奖励</option>
              <option value="punish">惩罚</option>
              <option value="question">问题</option>
            </select>
            <textarea id="content" class="w-full rounded-lg border px-3 py-2 soft-input" rows="3" placeholder="输入想和TA玩的小指令～（一行一条）" aria-label="输入情侣互动指令"></textarea>
            <input id="nickname" class="w-full rounded-lg border px-3 py-2 soft-input" placeholder="昵称（可选）" aria-label="输入昵称">
            <button class="btn-soft w-full rounded-lg px-4 py-2 font-semibold" type="submit" aria-label="提交情侣飞行棋指令">提交❤️</button>
          </form>
        </article>
      </aside>
    </section>
  </main>

  <dialog id="task-dialog" class="task-dialog">
    <h3 class="mb-2 text-lg font-semibold">事件格触发</h3>
    <div id="task-content" class="mb-4 rounded-lg bg-slate-50 p-3 text-slate-700"></div>
    <button id="close-task-btn" class="btn-soft rounded-lg px-4 py-2 font-semibold">完成</button>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="./script.js"></script>
</body>
</html>
